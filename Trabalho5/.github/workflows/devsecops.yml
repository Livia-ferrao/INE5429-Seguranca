name: DevSecOps Pipeline — Estágios INE

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LOG_OPTS: "--all"
        continue-on-error: true

  sca:
    name: SCA - Dependências (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/nodejs
            p/owasp-top-ten
            p/secrets
        continue-on-error: true

  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,yaml
          soft_fail: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secret-detection, sca, sast, iac-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Copiar nginx.conf para o frontend
        run: cp nginx.conf frontend/nginx.conf

      - name: Start application stack
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          echo "Aguardando backend inicializar..."
          sleep 40
          curl -f http://localhost:4000/ || (docker compose -f docker-compose.ci.yml logs backend && exit 1)

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:4000"
          fail_action: false
          cmd_options: "-a"
          allow_issue_writing: false
          artifact_name: "zap-report"
        continue-on-error: true

      - name: Stop application stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
